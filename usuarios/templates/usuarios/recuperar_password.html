<h2>Recuperar contraseña</h2>

{% if messages %}
    {% for message in messages %}
        <p>{{ message }}</p>
    {% endfor %}
{% endif %}

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Cambiar contraseña
    </button>

</form>

<br>

<a href="{% url 'login' %}">
    Volver al login
</a>
