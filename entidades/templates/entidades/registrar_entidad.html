<h2>Registrar Entidad</h2>

{% if messages %}
    {% for message in messages %}
        <p style="color:green;">
            {{ message }}
        </p>
    {% endfor %}
{% endif %}

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Guardar
    </button>

</form>

<br>

<a href="{% url 'consultar_entidades' %}">
    Consultar entidades
</a>
