{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

<h2>Auditoría del Sistema</h2>

<table class="table table-bordered">

<thead>

<tr>

<th>Usuario</th>

<th>Acción</th>

<th>Fecha</th>

</tr>

</thead>

<tbody>

{% for a in auditorias %}

<tr>

<td>{{ a.usuario }}</td>

<td>{{ a.accion }}</td>

<td>{{ a.fecha }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
