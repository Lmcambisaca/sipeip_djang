{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Inicio de sesión - SIPeIP</title>

    <link
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

<section class="vh-100">

    <div class="container py-5 h-100">

        <div class="row d-flex align-items-center justify-content-center h-100">

            <div class="col-md-8 col-lg-7 col-xl-6">

                <img
                    src="https://tse1.mm.bing.net/th/id/OIP.YyArK-CyliCkr5usDiwJHgHaE8?r=0&rs=1&pid=ImgDetMain&o=7&rm=3"
                    class="img-fluid"
                    alt="Login">

            </div>

            <div class="col-md-7 col-lg-5 col-xl-5 offset-xl-1">

                <div class="card shadow">

                    <div class="card-body p-5">

                        <div class="text-center mb-4">

                        <img
                            src="https://www.presidencia.gob.ec/wp-content/uploads/2025/10/secretaria_nacional_planificacion_desarrollo_senplades_sipeip3.jpg"
                            alt="Logo SIPeIP"
                            class="img-fluid rounded"
                            style="max-width: 100%; max-height: 120px; object-fit: contain;">

                    </div>

                        {% if messages %}

                            {% for message in messages %}

                                <div class="alert alert-danger">

                                    {{ message }}

                                </div>

                            {% endfor %}

                        {% endif %}

                        <form method="POST">

                            {% csrf_token %}

                            <div class="form-outline mb-4">

                                <label class="form-label">

                                    Usuario

                                </label>

                                <input
                                    type="text"
                                    name="username"
                                    class="form-control form-control-lg"
                                    placeholder="Ingrese su usuario"
                                    required>

                            </div>

                            <div class="form-outline mb-4">

                                <label class="form-label">

                                    Contraseña

                                </label>

                                <input
                                    type="password"
                                    name="password"
                                    class="form-control form-control-lg"
                                    placeholder="Ingrese su contraseña"
                                    required>

                            </div>

                            <div class="d-flex justify-content-between mb-4">

                                <div class="form-check">

                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        id="recordarme">

                                    <label
                                        class="form-check-label"
                                        for="recordarme">

                                        Recordarme

                                    </label>

                                </div>

                                <a href="{% url 'recuperar_password' %}">

                                    ¿Olvidó su contraseña?

                                </a>

                            </div>

                            <button
                                type="submit"
                                class="btn btn-primary btn-lg w-100">

                                <i class="fas fa-sign-in-alt"></i>

                                Iniciar sesión

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
