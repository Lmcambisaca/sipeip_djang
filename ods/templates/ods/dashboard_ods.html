{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

<h3>

Dashboard ODS

</h3>

<br>

<div class="row">

{% for d in datos %}

<div class="col-md-4">

<div class="card border-left-{{ d.color }} shadow mb-4">

<div class="card-body">

<h5>

{{ d.codigo }}

</h5>

<p>

{{ d.descripcion }}

</p>

<div class="progress">

<div

class="progress-bar bg-{{ d.color }}"

role="progressbar"

style="width: {{ d.porcentaje }}%;">

{{ d.porcentaje }} %

</div>

</div>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

{% endblock %}
