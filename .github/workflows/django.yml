name: Django Tests

on:

  push:

    branches:

      - main
      
      - master

  pull_request:


jobs:

  test:

    runs-on: ubuntu-latest


    services:

      mysql:

        image: mysql:8.0

        env:

          MYSQL_DATABASE: sipeip

          MYSQL_USER: root

          MYSQL_PASSWORD: root

          MYSQL_ROOT_PASSWORD: root

        ports:

          - 3306:3306

        options: >-

          --health-cmd="mysqladmin ping"

          --health-interval=10s

          --health-timeout=5s

          --health-retries=5


    steps:

      - uses: actions/checkout@v4


      - uses: actions/setup-python@v5

        with:

          python-version: "3.12"


      - name: Install dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt


      - name: Run Tests

        env:

          DB_NAME: sipeip

          DB_USER: root

          DB_PASSWORD: root

          DB_HOST: 127.0.0.1

          DB_PORT: 3306

        run:

          python manage.py test