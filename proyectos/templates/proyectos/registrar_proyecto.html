{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <div class="card shadow mb-4">

        <div class="card-header py-3">

            <h4 class="m-0 font-weight-bold text-primary">
                Registrar Proyecto
            </h4>

        </div>

        <div class="card-body">

            {% if messages %}

                {% for message in messages %}

                    <div class="alert alert-info">
                        {{ message }}
                    </div>

                {% endfor %}

            {% endif %}

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    class="btn btn-primary"
                    type="submit">

                    Guardar Proyecto

                </button>

                <a
                    href="{% url 'consultar_proyectos' %}"
                    class="btn btn-secondary">

                    Cancelar

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
