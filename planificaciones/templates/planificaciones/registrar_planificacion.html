<!DOCTYPE html>
<html>

<head>

    <title>Registrar Planificación</title>

</head>

<body>

<h2>Registrar Planificación</h2>

{% if messages %}

    {% for message in messages %}

        <p style="color:green;">
            {{ message }}
        </p>

    {% endfor %}

{% endif %}

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">

        Guardar

    </button>

</form>

<br>

<a href="{% url 'consultar_planificaciones' %}">

    Consultar Planificaciones

</a>

</body>

</html>
